  F:["explore",-1], S:["explore",+1],   // 探索：守 ↔ 野
  R:["rhythm",-1],  E:["rhythm",+1],    // 节奏：仪式 ↔ 随性

  roast:["浅烘 · 明亮","深烘 · 沉稳"],

/* ---- 事件追踪：GA4（若配置）+ 本机镜像 ---- */
function track(ev, props){
  props = props || {};
  try{ if(window.gtag) gtag('event', ev, props); }catch(e){}
  try{
    const k="cti_events", arr=JSON.parse(localStorage.getItem(k)||"[]");
    arr.push({ev, props, t:Date.now()});
    try{ localStorage.setItem(k, JSON.stringify(arr.slice(-3000))); }
    catch(e){ try{ localStorage.setItem(k, JSON.stringify(arr.slice(-500))); }catch(_){} }
  }catch(e){}
}
(function initGA(){
  if(!CONFIG.GA4_ID || CONFIG.GA4_ID.indexOf("XXXX")>=0) return;
  const s=document.createElement('script'); s.async=true;
  s.src="https://www.googletagmanager.com/gtag/js?id="+CONFIG.GA4_ID; document.head.appendChild(s);
  window.dataLayer=window.dataLayer||[]; window.gtag=function(){dataLayer.push(arguments)};
  gtag('js', new Date()); gtag('config', CONFIG.GA4_ID);
})();

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
/* 设同值 hash 不会触发 hashchange——这里强制重渲，堵掉「返回到当前 hash 看似没反应」的死角 */
function go(h){ if(location.hash.replace(/^#/,'')===h){ route(); } else { location.hash = h; } }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function bindCommon(){

}
function render(html){ stage.innerHTML=html; stage.classList.remove('fade'); void stage.offsetWidth; stage.classList.add('fade'); bindCommon(); }

/* ---- 选题：简单=CORE；深度=CORE+DEEP_SHARED(基线25) + 按角色采样最多10题，clamp 到 25–35，保轴均衡 ---- */
function balanceByAxis(qs){
  const by={}; qs.forEach(q=>{ (by[q.axis]=by[q.axis]||[]).push(q); });
  const axes=Object.keys(by); axes.forEach(a=>shuffle(by[a]));
  const out=[]; let added=true;
  while(added){ added=false; axes.forEach(a=>{ if(by[a].length){ out.push(by[a].shift()); added=true; } }); }
  return out;
}
function buildQuestionSet(){
  let qs;
  if(state.depth==="simple"){
    qs = shuffle(CORE.slice());
  } else {
    const base = CORE.concat(DEEP_SHARED);
    const seen = new Set(base.map(q=>q.id));
    let roleQs = [];
    state.roles.forEach(rid=>(ROLE_BANK[rid]||[]).forEach(q=>{ if(!seen.has(q.id)){ seen.add(q.id); roleQs.push(q); } }));
    const slots = Math.max(0, DEEP_CAP - base.length);
    roleQs = balanceByAxis(roleQs).slice(0, slots);
    qs = shuffle(base.concat(roleQs));
  }
  state.qset=qs; state.qi=0; state.answers=[];
  state.axisCount={}; qs.forEach(q=>state.axisCount[q.axis]=(state.axisCount[q.axis]||0)+1);
}
function startQuiz(){
  buildQuestionSet();
  track('quiz_start', {depth:state.depth, roles:[...state.roles].join('|')||"none", count:state.qset.length});
  go('quiz');   // give the quiz a history entry so 移动端边缘返回手势落回 intro，而不是直接离站
}

function screenQuestion(){
  const Q = state.qset[state.qi], n = state.qset.length;
  const dots = state.qset.map((_,i)=>`<i class="${i<=state.qi?'on':''}"></i>`).join('');
  const tier = TIER_LABEL[Q.tier] ? `<span class="qtier">${TIER_LABEL[Q.tier]}</span>` : '';
  const poles = (Math.random()<.5) ? [Q.poleA,Q.poleB] : [Q.poleB,Q.poleA];
  const opts = [
    {t:poles[0].t, L:poles[0].L},
    {t:poles[1].t, L:poles[1].L},
    {t:Q.mid.t,  L:"", soft:true},
    {t:Q.skip.t, L:"", soft:true}
  ];
  const optHtml = opts.map(o=>`<button class="opt${o.soft?' soft':''}" data-l="${o.L||''}">${esc(o.t)}</button>`).join('');
  render(`
    <div class="prog">${dots}</div>
    <div class="qcount">${String(state.qi+1).padStart(2,'0')} / ${n}${tier}</div>
    <h2>${esc(Q.q)}</h2>
    <div class="mt2">${optHtml}</div>
  `);
  stage.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{
    state.answers[state.qi] = btn.dataset.l || null; state.qi++;
    (state.qi<n) ? screenQuestion() : finishQuiz();
  });
}

function finishQuiz(){
  const s={roast:0,explore:0,rhythm:0,mood:0,palate:0,social:0};
  state.answers.forEach(L=>{ if(L){ const m=AXIS[L]; if(m) s[m[0]]+=m[1]; } });
  const code=(s.roast>0?"D":"B")+(s.explore>0?"S":"F")+(s.rhythm>0?"E":"R")+(s.mood>0?"W":"C");
  const pal=s.palate>0?"L":"N", soc=s.social>0?"G":"O";
  state.result={code, scores:s, combo:pal+soc};
  track('quiz_complete', {type:code, type_name:TYPES[code].name, palate:pal, social:soc, depth:state.depth, roles:[...state.roles].join('|')||"none", count:state.qset.length});
  go('result');   // go() 已处理「当前已是 #result」的同值重渲，无需再分支
}

function axisBar(ax, score, cnt){
  const [lo,hi]=AXIS_FULL[ax], c=cnt||1;
  const pct=Math.max(6, Math.min(94, ((score+c)/(2*c))*100));
  const lp=score<0?'pick':'', rp=score>0?'pick':'';
  return `<div class="axis">
    <div class="lab"><span class="${lp}">${lo}</span><span class="${rp}">${hi}</span></div>
    <div class="track"><span class="dot" style="left:${pct}%"></span></div>
  </div>`;
}

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text+" "+url).then(done).catch(()=>{ b.textContent="复制失败，请手动复制地址栏"; reset(); });
  } else { b.textContent="请手动复制地址栏链接"; reset(); }
}

function submitWaitlist(code){
  const inp=document.getElementById('wl-email'), btn=document.getElementById('wl-btn'), msg=document.getElementById('wl-msg');
  const email=(inp.value||"").trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.textContent="邮箱格式看起来不太对，再检查一下？"; msg.style.color="var(--ink)"; return; }
  const ok=()=>{ inp.disabled=true; btn.disabled=true; btn.textContent="已收到 ✓";
    track('waitlist_submit',{type:code});
    msg.textContent="谢谢——上线时第一个告诉你。"; msg.style.color="var(--ink-soft)"; };
  const fail=()=>{ btn.disabled=false; btn.textContent="我想要";
    msg.textContent="没存上，网络好点再试一次？"; msg.style.color="var(--ink)"; };
  if(CONFIG.WAITLIST_ENDPOINT){
    btn.disabled=true; btn.textContent="提交中…";
    fetch(CONFIG.WAITLIST_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,type:code})})
      .then(r=>{ r.ok ? ok() : fail(); }).catch(fail);
  } else { ok(); }  // 未配置端点：仅记录意愿事件（邮箱不会被保存，见 README）
}

/* ---- 本机数据看板：访问 #stats（真实聚合请看 GA4）---- */
function screenStats(){
  let ev=[]; try{ ev=JSON.parse(localStorage.getItem('cti_events')||"[]"); }catch(e){}
  const c=n=>ev.filter(e=>e.ev===n).length;
  const starts=c('quiz_start'), done=c('quiz_complete');
  const compRate = starts? Math.round(done/starts*100):0;
  const dist={}; ev.filter(e=>e.ev==='quiz_complete').forEach(e=>{const k=e.props.type_name||e.props.type;dist[k]=(dist[k]||0)+1;});
  const distRows=Object.entries(dist).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td class="n">${v}</td></tr>`).join('')||`<tr><td class="muted">暂无</td><td class="n">0</td></tr>`;
  const demand={}; ev.filter(e=>e.ev==='intent').forEach(e=>{const k=(e.props.kind||'?')+' · '+(e.props.target||'');demand[k]=(demand[k]||0)+1;});
  const demandRows=Object.entries(demand).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([k,v])=>`<tr><td>${esc(k)}</td><td class="n">${v}</td></tr>`).join('')||`<tr><td class="muted">暂无</td><td class="n">0</td></tr>`;
  const roasterClk=ev.filter(e=>e.ev==='intent'&&e.props.kind==='roaster').length;
  const beanClk=ev.filter(e=>e.ev==='intent'&&e.props.kind==='bean').length;
  const cafeClk=ev.filter(e=>e.ev==='intent'&&e.props.kind==='cafe').length;
  render(`
    <div class="eyebrow">CoffeeTI · 本机演示数据</div>
    <h2 class="mt2">漏斗与意愿</h2>
    <p class="faint mt1">仅本设备 localStorage 统计，用于自测；真实访客聚合请在 GA4 后台看。</p>
    <table>
      <tr><th>指标</th><th style="text-align:right">数值</th></tr>
      <tr><td>开始测试</td><td class="n">${starts}</td></tr>
      <tr><td>完成测试</td><td class="n">${done}</td></tr>
      <tr><td>完成率</td><td class="n">${compRate}%</td></tr>
      <tr><td>想喝某支豆（购买意愿 · 非去重）</td><td class="n">${beanClk}</td></tr>
      <tr><td>想认识某烘焙商</td><td class="n">${roasterClk}</td></tr>
      <tr><td>想去某咖啡店</td><td class="n">${cafeClk}</td></tr>
      <tr><td>分享点击</td><td class="n">${c('share_click')}</td></tr>
      <tr><td>留资邮箱（最强需求信号）</td><td class="n">${c('waitlist_submit')}</td></tr>
    </table>
    <h2 class="mt3" style="font-size:1.3rem">被想要、但我们还没对接的（谈判资产）</h2>
    <p class="faint mt1">点了「想喝/想认识/想去」却被我们刻意留住、没放走的需求——这正是能拿去跟烘焙商谈的「现成买家」。</p>
    <table><tr><th>对象</th><th style="text-align:right">想要次数</th></tr>${demandRows}</table>
    <h2 class="mt3" style="font-size:1.3rem">人格分布</h2>
    <table><tr><th>人格</th><th style="text-align:right">人次</th></tr>${distRows}</table>
    <div class="actions">
      <button class="ghost" data-nav="">← 回到测试</button>
      <button class="ghost" id="clear">清空本机数据</button>
    </div>
  `);
  document.getElementById('clear').onclick=()=>{ if(confirm('清空本机演示数据？')){ localStorage.removeItem('cti_events'); screenStats(); } };
}

/* ---- 路由 ---- */
function route(){
  const h = location.hash.replace(/^#/,'');
  if(h==='') return screenIntro();
  if(h==='result'){
    if(state.result) return screenResult();
    try{ history.replaceState(null,'','#'); }catch(e){}
    return screenIntro();
  }
  if(h==='quiz') return (state.qset.length && state.qi<state.qset.length && !state.result) ? screenQuestion() : screenIntro();
  if(h==='stats') return screenStats();
  if(h==='roasters') return screenRoasters();
  if(h==='cafes') return screenCafes();
  if(h==='cats/bean') return screenBeanCats();
  if(h==='cats/equip') return screenEquipCats();
  const m = h.split('/');
  if(m[0]==='cat' && m[1]==='bean') return screenBeanCat(m[2]);
  if(m[0]==='cat' && m[1]==='equip') return screenEquipCat(m[2]);
  if(m[0]==='roaster') return screenRoaster(m[1]);
  if(m[0]==='cafes') return screenCafes(m[1]);
  if(m[0]==='cafe') return screenCafe(m[1]);
  return screenIntro();
}
window.addEventListener('hashchange', route);
route();
</script>
